<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Support Widget</title>

  <style>
    #launcher {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      user-select: none;
    }

    #chatbox {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 320px;
      height: 420px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: none;
      flex-direction: column;
      background: white;
      overflow: hidden;
      font-family: Arial;
    }

    #header {
      background: #2563eb;
      color: white;
      padding: 10px;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }

    #inputBox {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #input {
      flex: 1;
      border: none;
      padding: 10px;
      outline: none;
    }

    #send {
      border: none;
      background: #2563eb;
      color: white;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="launcher">💬</div>

<div id="chatbox">
  <div id="header">Support</div>
  <div id="messages"></div>

  <div id="inputBox">
    <input id="input" placeholder="Type message..." />
    <button id="send">Send</button>
  </div>
</div>

<script src="./widget.js"></script>

</body>
</html>
