<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виджет поддержки</title>
    <style>
        #chat-widget {
            position: fixed; bottom: 20px; right: 20px;
            width: 320px; height: 450px; background: #fff;
            border: 1px solid #ccc; border-radius: 12px;
            display: none; flex-direction: column;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            font-family: 'Segoe UI', sans-serif; overflow: hidden; z-index: 1000;
            transform-origin: bottom right;
            animation: widgetOpen 0.25s ease-out;
        }
        #chat-widget.closing {
            animation: widgetClose 0.2s ease-in forwards;
        }
        @keyframes widgetOpen {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes widgetClose {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.9); }
        }
        #chat-header {
            background: #007bff; color: #fff; padding: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-btns { display: flex; gap: 8px; }
        .btn-finish { background: #ff4d4f; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .btn-hide { cursor: pointer; font-size: 20px; border: none; background: none; color: white; line-height: 1; }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg.cl { align-self: flex-end; background: #007bff; color: #fff; border-bottom-right-radius: 2px; }
        .msg.op { align-self: flex-start; background: #e9ecef; color: #212529; border-bottom-left-radius: 2px; }
        
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        #chat-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        #chat-send { background: #007bff; color: #fff; border: none; padding: 0 15px; margin-left: 5px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #chat-attach { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 6px; color: #64748b; }
        #chat-attach:hover { color: #007bff; }
        .msg-file { display: flex; align-items: center; gap: 6px; }
        .msg-file a { color: inherit; text-decoration: underline; }
        .msg-image { max-width: 100%; border-radius: 8px; cursor: pointer; }

        /* Rating */
        .rating-overlay { display: none; text-align: center; padding: 20px; background: #fff; border-radius: 10px; margin-top: 10px; }
        .rating-overlay.visible { display: block; }
        .rating-overlay p { margin: 0 0 10px; font-size: 13px; color: #64748b; }
        .rating-stars { display: flex; justify-content: center; gap: 4px; }
        .rating-stars span { font-size: 24px; cursor: pointer; color: #cbd5e1; transition: color 0.15s; }
        .rating-stars span.active, .rating-stars span:hover { color: #f59e0b; }
        
        /* Typing indicator styles for widget */
        .typing-indicator-widget { 
            display: flex; 
            justify-content: flex-start; 
            align-items: center; 
            padding: 10px 15px; 
            margin: -10px 0 10px 0;
        }
        .typing-indicator-widget span { 
            width: 6px; 
            height: 6px; 
            background: #94a3b8; 
            border-radius: 50%; 
            display: block;
            margin-right: 3px;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-indicator-widget span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator-widget span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator-widget span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        #chat-open-btn {
            position: fixed; bottom: 20px; right: 20px;
            padding: 14px 22px; background: #007bff; color: #fff;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
            position: fixed;
        }
        #unread-badge {
            position: absolute; top: -6px; right: -6px;
            background: #ff4d4f; color: #fff; font-size: 11px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: none; align-items: center; justify-content: center;
            padding: 0 4px; line-height: 1;
        }

        @media (max-width: 400px) {
            #chat-widget {
                width: 100%; height: 100%;
                bottom: 0; right: 0;
                border-radius: 0; border: none;
            }
            #chat-open-btn {
                bottom: 10px; right: 10px;
                padding: 12px 18px; font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <button id="chat-open-btn" style="position:relative;">💬 Поддержка<span id="unread-badge"></span></button>

    <div id="chat-widget">
        <div id="chat-header">
            <span>Поддержка</span>
            <div class="header-btns">
                <button class="btn-finish" id="chat-finish" style="display:none;">Завершить</button>
                <button class="btn-hide" id="close-ui">×</button>
            </div>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="file" id="chat-file" style="display:none" accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.txt">
            <button id="chat-attach" title="Прикрепить файл">📎</button>
            <input type="text" id="chat-input" placeholder="Ваш вопрос...">
            <button id="chat-send">></button>
        </div>
    </div>

    <script src="widget.js"></script>
</body>
</html>
