<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Оператора</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #f5f7f9; --sidebar: #ffffff; --border: #e2e8f0; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); }
        
        #sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        
        /* Табы переключения */
        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); background: #f8fafc; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: #fff; }

        .msg-image { max-width: 200px; border-radius: 8px; cursor: pointer; }
        .msg-file { display: flex; align-items: center; gap: 4px; }
        .msg-file a { color: inherit; text-decoration: underline; font-size: 13px; }

        #chatList { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; position: relative; }
        .chat-item.active { background: #eff6ff; border-left: 4px solid var(--primary); }
        .chat-avatar { width: 36px; height: 36px; background: #cbd5e1; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; margin-right: 12px; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 14px; }
        .chat-timer { font-size: 11px; margin-top: 4px; color: #94a3b8; }
        .has-new-msg::after { content: ''; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }
        .chat-unread-badge { background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); z-index: 1; }
        .has-new-msg:has(.chat-unread-badge)::after { display: none; }
        .chat-item.waiting { background: #fffbeb; border-left: 4px solid #f59e0b; }
        .chat-item.waiting .chat-timer { color: #d97706; }
        
        /* Typing indicator styles */
        .typing-indicator { display: flex; gap: 2px; margin-top: 2px; }
        .typing-indicator span { 
            width: 6px; 
            height: 6px; 
            background: #94a3b8; 
            border-radius: 50%; 
            display: block;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #chatHeader { height: 60px; background: #fff; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); font-weight: 600; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; }
        
        .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; }
        .message-bubble.cl { align-self: flex-start; background: #fff; border: 1px solid var(--border); }
        .message-bubble.op { align-self: flex-end; background: var(--primary); color: #fff; }
        .time { font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right; }
        
        /* Read receipt styles */
        .message-read { opacity: 0.7; }
        
        .input-container { padding: 20px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        #send { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #send:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .btn-close { background: #fee2e2; color: #ef4444; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .archive-badge { background: #f1f5f9; color: #64748b; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; }
        .btn-templates { background: #f0f4ff; color: var(--primary); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: 8px; }
        .btn-attach { background: none; border: 1px solid var(--border); color: #64748b; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-attach:hover { color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; padding: 20px; }
        .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-card .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); }
        .stat-card .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 12px; width: 520px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 16px; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; }
        .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); }

        .template-search { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }
        .template-list { list-style: none; padding: 0; margin: 0; }
        .template-item { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; }
        .template-item:hover { background: #f0f4ff; }
        .template-item .t-title { font-weight: 600; font-size: 14px; }
        .template-item .t-shortcut { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .template-item .t-content { font-size: 12px; color: #64748b; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .template-item .t-actions { float: right; display: flex; gap: 4px; }
        .template-item .t-actions button { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
        .t-actions .t-edit { color: var(--primary); }
        .t-actions .t-delete { color: #ef4444; }

        .template-form { display: none; margin-top: 12px; }
        .template-form.open { display: block; }
        .template-form input, .template-form textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; box-sizing: border-box; font-family: inherit; }
        .template-form textarea { height: 60px; resize: vertical; }
        .template-form .form-btns { display: flex; gap: 8px; }
        .template-form .btn-save { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .template-form .btn-cancel { background: #f1f5f9; color: #64748b; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }

        .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .confirm-overlay.open { display: flex; }
        .confirm-box { background: #fff; border-radius: 12px; padding: 24px; width: 340px; max-width: 90vw; box-shadow: 0 8px 30px rgba(0,0,0,0.15); text-align: center; }
        .confirm-box p { margin: 0 0 20px; font-size: 15px; }
        .confirm-box .confirm-btns { display: flex; gap: 10px; justify-content: center; }
        .confirm-box .btn-yes { background: #ef4444; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .confirm-box .btn-no { background: #f1f5f9; color: #64748b; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }

        #sidebar-toggle { display: none; background: var(--primary); color: #fff; border: none; padding: 10px 14px; cursor: pointer; font-size: 18px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
            #sidebar.collapsed { display: none; }
            #sidebar-toggle { display: block; }
            #chatHeader { padding: 0 10px; }
            #chat { padding: 10px; }
            .input-container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-tabs">
            <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">Активные</button>
            <button class="tab-btn" id="tab-archive" onclick="switchTab('archive')">Архив</button>
            <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">Статистика</button>
        </div>
        <div id="chatList"></div>
    </div>
    <div id="chat-area">
        <button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button>
        <div id="chatHeader">Выберите чат</div>
        <div id="chat"></div>
        <div class="input-container" id="input-area">
            <input type="file" id="file-input" style="display:none" accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.txt">
            <input type="text" id="input" placeholder="Сообщение... (/ для шаблонов)" disabled>
            <button class="btn-attach" id="btnAttach" title="Прикрепить файл" onclick="document.getElementById('file-input').click()">📎</button>
            <button class="btn-templates" id="btnTemplates" onclick="openTemplateModal()" title="Шаблоны ответов">📋</button>
            <button id="send" disabled>Отправить</button>
        </div>
    </div>

    <div class="modal-overlay" id="templateModal">
        <div class="modal">
            <div class="modal-header">
                <span>Шаблоны ответов</span>
                <button class="modal-close" onclick="closeTemplateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" class="template-search" id="templateSearch" placeholder="Поиск по названию или /shortcut..." oninput="filterTemplates()">
                <ul class="template-list" id="templateList"></ul>
                <div class="template-form" id="templateForm">
                    <input type="text" id="tfShortcut" placeholder="Shortcut (например: hello)">
                    <input type="text" id="tfTitle" placeholder="Название шаблона">
                    <textarea id="tfContent" placeholder="Текст шаблона..."></textarea>
                    <input type="hidden" id="tfId">
                    <div class="form-btns">
                        <button class="btn-save" onclick="saveTemplate()">Сохранить</button>
                        <button class="btn-cancel" onclick="cancelTemplateForm()">Отмена</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-save" onclick="openTemplateForm()" style="width:100%;">+ Новый шаблон</button>
            </div>
        </div>
    </div>

    <div class="confirm-overlay" id="confirmModal">
        <div class="confirm-box">
            <p id="confirmText">Завершить чат?</p>
            <div class="confirm-btns">
                <button class="btn-yes" id="confirmYes">Завершить</button>
                <button class="btn-no" id="confirmNo">Отмена</button>
            </div>
        </div>
    </div>

    <script src="operator.js"></script>
</body>
</html>
