<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Operator Panel</title>

<style>
body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
}

.layout {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 320px;
  border-right: 1px solid #eee;
  background: #fafafa;
  overflow-y: auto;
}

.chat-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.chat-item:hover {
  background: #f5f5f5;
}

.chat-item.active {
  background: #e6f0ff;
}

.chat-title {
  font-weight: 600;
}

.chat-preview {
  font-size: 12px;
  color: #777;
}

.chat-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
}

.unread {
  background: red;
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
}

/* CHAT AREA */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.msg {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  position: relative;
}

.msg.client {
  background: #f1f1f1;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.msg.operator {
  background: #007bff;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.msg-time {
  font-size: 10px;
  margin-top: 4px;
  opacity: 0.6;
}

/* INPUT */
.input-area {
  display: flex;
  border-top: 1px solid #eee;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

.input-area button {
  padding: 12px 18px;
  border: none;
  background: #007bff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="layout">

  <div class="sidebar" id="chatList"></div>

  <div class="chat-area">
    <div class="messages" id="chat"></div>

    <div class="input-area">
      <input id="input" placeholder="Написать сообщение..." />
      <button id="send">Send</button>
    </div>
  </div>

</div>

<script src="./operator.js"></script>
</body>
</html>
