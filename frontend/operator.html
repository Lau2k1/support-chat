<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель оператора</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        #sidebar { width: 250px; border-right: 1px solid #ccc; background: #f9f9f9; overflow-y: auto; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; background: #fff; }
        #input-area { padding: 20px; border-top: 1px solid #ccc; display: flex; }
        #input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        #send { padding: 10px 20px; margin-left: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .chat-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .chat-item:hover { background: #e9ecef; }
        .msg-client { text-align: left; margin: 10px 0; color: #333; }
        .msg-operator { text-align: right; margin: 10px 0; color: #007bff; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #ccc;">Активные чаты</div>
    <div id="chat-list"></div>
</div>

<div id="chat-area">
    <div id="messages">Выберите чат слева, чтобы начать переписку</div>
    <div id="input-area">
        <input type="text" id="input" placeholder="Введите сообщение...">
        <button id="send">Отправить</button>
    </div>
</div>

<script src="operator.js"></script>
</body>
</html>
